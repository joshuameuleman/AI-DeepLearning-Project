<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Meekijken</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <header class="topbar">
      <h1 id="title">Game Meekijken</h1>
      <div class="stats">
        <span id="metricLabel">Score: <strong id="score">0</strong></span>
        <span>Best: <strong id="highscore">0</strong></span>
      </div>
    </header>

    <section class="toolbar" aria-label="Snake DQN bediening">
      <div class="field">
        <label for="gridSelect">Grid</label>
        <select id="gridSelect">
          <option value="16">16x16</option>
          <option value="32">32x32</option>
          <option value="64">64x64</option>
          <option value="128">128x128</option>
        </select>
      </div>
      <div class="field">
        <label for="episodesInput">Episodes</label>
        <input id="episodesInput" type="number" min="1" max="100" value="3" />
      </div>
      <button id="simulate" type="button">Simuleer best_eval</button>
      <div class="field">
        <label for="trainEpisodesInput">Training</label>
        <input id="trainEpisodesInput" type="number" min="1" max="1000000" value="10000" />
      </div>
      <select id="profileSelect" aria-label="Trainingprofiel">
        <option value="fast">Fast</option>
        <option value="balanced" selected>Balanced</option>
        <option value="quality">Quality</option>
      </select>
      <button id="train" type="button">Train grid</button>
    </section>

    <section class="panel">
      <canvas id="game" width="64" height="64" aria-label="Game canvas"></canvas>

      <div class="controls">
        <label for="gameSelect">Game</label>
        <select id="gameSelect">
          <option value="snake">Snake</option>
          <option value="flappy">Flappy Bird</option>
        </select>
        <button id="toggle" type="button">Pauze</button>
        <button id="reset" type="button">Reset</button>
        <label for="speed">Snelheid</label>
        <input id="speed" type="range" min="1" max="120" value="12" />
      </div>

      <p class="hint" id="hint">Live game viewer. Geen fallback: de pagina toont alleen echte feed-data.</p>
    </section>

    <section class="model-strip" id="modelStrip" aria-label="Beschikbare Snake modellen"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
